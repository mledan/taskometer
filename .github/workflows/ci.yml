name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier runs of this workflow on the same branch when a new
# commit lands — saves CI minutes during a fast push cadence.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Test
        # CI=true makes vitest run once and exit instead of staying in
        # watch mode. Tests are non-blocking until we tighten coverage,
        # but a failure should still get a maintainer's attention.
        run: CI=true npm test -- --run
